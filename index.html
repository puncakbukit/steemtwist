<!--
  Steem Vue Template
  A minimal SPA template using steem-js, Steem Keychain, Vue 3 CDN, and Vue Router 4.
  Based on the Reversteem project structure.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SteemTwist 🌀</title>

  <!-- steem-js -->
  <script src="https://cdn.jsdelivr.net/npm/@steemit/steem-js@0.8.0/dist/steem.min.js"></script>

  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <!-- Vue Router 4 -->
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>

  <!-- marked.js — Markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }
    h1 { margin-top: 20px; }
    button {
      padding: 8px 14px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background-color: #2e7d32;
      color: white;
      font-size: 14px;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    hr { margin: 30px 0; border: none; border-top: 1px solid #ddd; }
    .nav-active { text-decoration: underline !important; color: #1b5e20 !important; }
    .notification {
      margin: 10px auto;
      padding: 10px 14px;
      border-radius: 6px;
      max-width: 600px;
      font-size: 14px;
    }
    .notification.error   { background: #ffebee; border: 1px solid #ef9a9a; color: #b71c1c; }
    .notification.success { background: #e8f5e9; border: 1px solid #a5d6a7; color: #1b5e20; }
    .notification.info    { background: #e3f2fd; border: 1px solid #90caf9; color: #0d47a1; }
    .keychain-notice {
      margin: 10px auto;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff8e1;
      max-width: 600px;
    }
    /* Scoped markdown rendering inside twist cards */
    .twist-body { font-size: 15px; line-height: 1.6; word-break: break-word; }
    .twist-body p          { margin: 0 0 8px; }
    .twist-body p:last-child { margin-bottom: 0; }
    .twist-body h1, .twist-body h2, .twist-body h3 { font-size: 1em; font-weight: bold; margin: 6px 0 4px; }
    .twist-body ul, .twist-body ol { margin: 4px 0 8px 20px; padding: 0; }
    .twist-body li         { margin-bottom: 2px; }
    .twist-body code       { background: #f4f4f4; border-radius: 3px; padding: 1px 5px; font-size: 13px; }
    .twist-body pre        { background: #f4f4f4; border-radius: 6px; padding: 10px; overflow-x: auto; }
    .twist-body pre code   { background: none; padding: 0; }
    .twist-body blockquote { border-left: 3px solid #a5d6a7; margin: 6px 0; padding: 4px 10px; color: #555; }
    .twist-body a          { color: #2e7d32; }
    .twist-body img        { max-width: 100%; border-radius: 6px; margin-top: 6px; }
    /* README rendering on the About page */
    .readme-body           { font-size: 15px; line-height: 1.7; color: #333; }
    .readme-body h1        { font-size: 1.6em; border-bottom: 2px solid #e8f5e9; padding-bottom: 6px; margin-bottom: 12px; }
    .readme-body h2        { font-size: 1.3em; border-bottom: 1px solid #e8f5e9; padding-bottom: 4px; margin: 24px 0 10px; }
    .readme-body h3        { font-size: 1.1em; margin: 18px 0 8px; }
    .readme-body table     { width: 100%; border-collapse: collapse; font-size: 14px; margin: 12px 0; }
    .readme-body th        { background: #e8f5e9; text-align: left; padding: 7px 10px; border: 1px solid #c8e6c9; }
    .readme-body td        { padding: 6px 10px; border: 1px solid #e0e0e0; }
    .readme-body hr        { border: none; border-top: 1px solid #e0e0e0; margin: 20px 0; }
    /* Firehose: flash highlight when a new twist arrives live */
    @keyframes twistFlash {
      0%   { background-color: #e3f2fd; }
      100% { background-color: #fff;    }
    }
    .twist-flash {
      animation: twistFlash 2.5s ease-out forwards;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="blockchain.js"></script>
  <script src="components.js"></script>
  <script src="app.js"></script>
</body>
</html>
