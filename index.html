<!--
  Steem Vue Template
  A minimal SPA template using steem-js, Steem Keychain, Vue 3 CDN, and Vue Router 4.
  Based on the Reversteem project structure.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SteemTwist 🌀</title>

  <!-- steem-js -->
  <script src="https://cdn.jsdelivr.net/npm/@steemit/steem-js@0.8.0/dist/steem.min.js"></script>

  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <!-- Vue Router 4 -->
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }
    h1 { margin-top: 20px; }
    button {
      padding: 8px 14px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background-color: #2e7d32;
      color: white;
      font-size: 14px;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    hr { margin: 30px 0; border: none; border-top: 1px solid #ddd; }
    .nav-active { text-decoration: underline !important; color: #1b5e20 !important; }
    .notification {
      margin: 10px auto;
      padding: 10px 14px;
      border-radius: 6px;
      max-width: 600px;
      font-size: 14px;
    }
    .notification.error   { background: #ffebee; border: 1px solid #ef9a9a; color: #b71c1c; }
    .notification.success { background: #e8f5e9; border: 1px solid #a5d6a7; color: #1b5e20; }
    .notification.info    { background: #e3f2fd; border: 1px solid #90caf9; color: #0d47a1; }
    .keychain-notice {
      margin: 10px auto;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff8e1;
      max-width: 600px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="blockchain.js"></script>
  <script src="components.js"></script>
  <script src="app.js"></script>
</body>
</html>
