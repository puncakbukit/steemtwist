<!--
  Steem Vue Template
  A minimal SPA template using steem-js, Steem Keychain, Vue 3 CDN, and Vue Router 4.
  Based on the Reversteem project structure.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src * data:; frame-src 'self'; connect-src 'self' https://api.steemit.com https://api.justyy.com https://steemd.steemworld.org https://api.steem.fans https://steemitimages.com;" />
  <title>SteemTwist 🌀</title>

  <!-- Steem JS -->
  <script src="https://cdn.jsdelivr.net/npm/@steemit/steem-js@0.8.0/dist/steem.min.js" integrity="sha256-YXzRDre5WLBe0GW31xpG8482t5CeYqtg5SitXO1rgUA=" crossorigin="anonymous"></script>

  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3.5.31/dist/vue.global.js" integrity="sha256-cr1UaSE51jpGqNcuvoBym1n+PGtWFY2TGxYSSJMVFk0=" crossorigin="anonymous"></script>

  <!-- Vue Router 4 -->
  <script src="https://unpkg.com/vue-router@4.6.4/dist/vue-router.global.js" integrity="sha256-p5CN9Rlm5VT7vZWXRqaXJf+lHl6gIaBMb2RdCB0kwLA=" crossorigin="anonymous"></script>

  <!-- marked.js — Markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js" integrity="sha256-YAKvY0hbBD+mDdq6GzQ2O5jSqLLGO2BwBPOiQFqKBTo=" crossorigin="anonymous"></script>

  <!-- DOMPurify — HTML sanitizer used by the Live Twist sandbox -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js" integrity="sha256-wIRQlqfEpnQfNirFBslMHH0n3GA7zBv2Slh/dvLb46E=" crossorigin="anonymous"></script>

  <style>
    /* ── Design tokens ──────────────────────────────────────────────────────
       Derived from the SteemTwist cover image gradient:
       left  #1a3af5 (deep blue)  →  centre #8b2fc9 (purple)  →  right #e0187a (pink)
       Accent: cyan #22d3ee  |  light-purple #a855f7  |  pink #ec4899
    ─────────────────────────────────────────────────────────────────────── */
    :root {
      --bg:           #0f0a1e;
      --surface:      #1a1030;
      --card:         #1e1535;
      --card-border:  #2e2050;
      --grad-start:   #1a3af5;
      --grad-mid:     #8b2fc9;
      --grad-end:     #e0187a;
      --accent:       #a855f7;
      --accent-cyan:  #22d3ee;
      --accent-pink:  #ec4899;
      --text:         #e8e0f0;
      --text-muted:   #9b8db0;
      --text-faint:   #8a7ea6;
      --green-hi:     #4ade80;
      --green-lo:     #166534;
    }

    body {
      font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
    }

    h1 { margin-top: 20px; }

    /* Global button baseline — overridden per-component via inline styles */
    button {
      padding: 8px 14px;
      margin: 5px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--grad-mid), var(--grad-end));
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    button:hover   { opacity: 0.88; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    hr { margin: 30px 0; border: none; border-top: 1px solid var(--card-border); }

    /* Nav active state */
    .nav-active {
      text-decoration: underline !important;
      color: var(--accent-cyan) !important;
    }

    /* Notification banners */
    .notification {
      margin: 10px auto;
      padding: 10px 14px;
      border-radius: 10px;
      max-width: 600px;
      font-size: 14px;
    }
    .notification.error   { background:#2d0a0a; border:1px solid #7f1d1d; color:#fca5a5; }
    .notification.success { background:#0a2d12; border:1px solid #166534; color:#86efac; }
    .notification.info    { background:#0a1a2d; border:1px solid #1e3a5f; color:#93c5fd; }

    .keychain-notice {
      margin: 10px auto;
      padding: 10px 14px;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text-muted);
      max-width: 600px;
      font-size: 14px;
    }

    /* Markdown inside twist cards */
    .twist-body { font-size: 15px; line-height: 1.6; word-break: break-word; color: var(--text); }
    .twist-body p            { margin: 0 0 8px; }
    .twist-body p:last-child { margin-bottom: 0; }
    .twist-body h1, .twist-body h2, .twist-body h3
                             { font-size: 1em; font-weight: bold; margin: 6px 0 4px; color: var(--accent); }
    .twist-body ul, .twist-body ol { margin: 4px 0 8px 20px; padding: 0; }
    .twist-body li           { margin-bottom: 2px; }
    .twist-body code         { background: var(--bg); border-radius: 4px; padding: 1px 5px;
                               font-size: 13px; color: var(--accent-cyan); border: 1px solid var(--card-border); }
    .twist-body pre          { background: var(--bg); border-radius: 8px; padding: 10px;
                               overflow-x: auto; border: 1px solid var(--card-border); }
    .twist-body pre code     { background: none; padding: 0; border: none; }
    .twist-body blockquote   { border-left: 3px solid var(--accent); margin: 6px 0;
                               padding: 4px 10px; color: var(--text-muted); }
    .twist-body a            { color: var(--accent-cyan); }
    .twist-body img          { max-width: 100%; border-radius: 8px; margin-top: 6px; }

    /* README / About page */
    .readme-body           { font-size: 15px; line-height: 1.7; color: var(--text); }
    .readme-body h1        { font-size: 1.6em; border-bottom: 2px solid var(--card-border);
                             padding-bottom: 6px; margin-bottom: 12px; color: var(--accent); }
    .readme-body h2        { font-size: 1.3em; border-bottom: 1px solid var(--card-border);
                             padding-bottom: 4px; margin: 24px 0 10px; color: var(--accent); }
    .readme-body h3        { font-size: 1.1em; margin: 18px 0 8px; color: var(--text); }
    .readme-body table     { width: 100%; border-collapse: collapse; font-size: 14px; margin: 12px 0; }
    .readme-body th        { background: var(--surface); text-align: left;
                             padding: 7px 10px; border: 1px solid var(--card-border); color: var(--accent); }
    .readme-body td        { padding: 6px 10px; border: 1px solid var(--card-border); }
    .readme-body hr        { border: none; border-top: 1px solid var(--card-border); margin: 20px 0; }
    .readme-body code      { background: var(--bg); border-radius: 4px; padding: 1px 5px;
                             font-size: 13px; color: var(--accent-cyan); border: 1px solid var(--card-border); }
    .readme-body pre       { background: var(--bg); border-radius: 8px; padding: 10px;
                             overflow-x: auto; border: 1px solid var(--card-border); }
    .readme-body a         { color: var(--accent-cyan); }

    /* Firehose new-twist flash — cyan highlight matching theme */
    @keyframes twistFlash {
      0%   { background-color: #0e2233; }
      100% { background-color: var(--card); }
    }
    .twist-flash { animation: twistFlash 2.5s ease-out forwards; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Spinner colour */
    .spin-ring { border-top-color: var(--accent) !important; }

    /* Shared layout utilities for view templates */
    .sb-view {
      margin-top: 20px;
    }
    .sb-toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .sb-toolbar-muted {
      font-size: 13px;
      color: var(--text-faint);
    }
    .sb-sort-group {
      margin-left: auto;
      display: flex;
      gap: 4px;
    }
    .sb-chip-btn {
      background: var(--card);
      color: var(--accent);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 12px;
      margin: 0;
    }
    .sb-pill-btn {
      background: var(--card);
      color: var(--accent);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 6px 24px;
      font-size: 13px;
      cursor: pointer;
    }
    .sb-pulse {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #fb923c;
      font-size: 12px;
    }
    .sb-pulse-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fb923c;
      animation: twistFlash 1s ease-in-out infinite alternate;
    }
    .sb-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
    }
    .sb-guest-card {
      max-width: 600px;
      margin: 0 auto 20px;
      overflow: hidden;
    }
    .sb-empty-state {
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
      padding: 32px 20px;
    }
    .sb-empty-feed {
      color: var(--text-faint);
      padding: 40px 0;
      font-size: 15px;
      text-align: center;
    }
    .sb-pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 16px 0;
    }
    .sb-link {
      color: var(--accent);
      font-size: 14px;
      text-decoration: none;
    }
    .sb-profile-wrap {
      max-width: 600px;
      margin: 0 auto 16px;
    }
    .sb-profile-card {
      padding: 16px;
    }
    .sb-post-card {
      padding: 14px 16px;
      margin: 10px auto;
      max-width: 600px;
      text-align: left;
    }
    .sb-loading-wrap {
      text-align: center;
      padding: 18px 10px 26px;
      color: var(--text-faint);
    }
    .st-header-compact nav a {
      padding-top: 4px !important;
      padding-bottom: 4px !important;
      font-size: 13px !important;
    }
    .st-header-compact > div:nth-child(3) {
      backdrop-filter: blur(2px);
    }
    .st-media-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin: 8px 0;
    }
    .st-media-grid a,
    .st-media-grid img,
    .st-media-grid video {
      display: block;
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      margin: 0 !important;
    }
    .sb-skeleton-wrap {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .sb-skeleton-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .sb-skeleton-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .sb-skeleton-avatar,
    .sb-skeleton-line {
      background: linear-gradient(90deg, rgba(90,78,112,.28) 25%, rgba(138,122,168,.44) 37%, rgba(90,78,112,.28) 63%);
      background-size: 380px 100%;
      animation: sbShimmer 1.25s ease-in-out infinite;
      border-radius: 8px;
    }
    .sb-skeleton-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sb-skeleton-line {
      display: block;
      height: 12px;
      width: 100%;
      margin-bottom: 8px;
    }
    .sb-skeleton-line:last-child { margin-bottom: 0; }
    .sb-skeleton-line--short { width: 40%; margin-bottom: 0; }
    .sb-skeleton-line--mid   { width: 72%; }
    .sb-skeleton-line--tiny  { width: 34%; }
    .sb-loading-text {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--text-faint);
    }
    @keyframes sbShimmer {
      0% { background-position: -240px 0; }
      100% { background-position: 240px 0; }
    }
    .sb-suggestion-panel {
      margin: 0 auto 14px;
      max-width: 360px;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      background: #170f2b;
      padding: 10px;
      text-align: left;
    }
    .sb-suggestion-title {
      color: var(--accent);
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .sb-suggest-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-decoration: none;
      color: var(--text);
      padding: 8px 8px;
      border-radius: 8px;
      border: 1px solid transparent;
      margin-bottom: 6px;
      background: #1d1334;
    }
    .sb-suggest-row:last-child { margin-bottom: 0; }
    .sb-suggest-row:hover {
      border-color: #3b2a62;
      background: #24193f;
    }
    .sb-suggest-loading {
      color: var(--text-muted);
      font-size: 12px;
      padding: 6px 4px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="blockchain.js"></script>
  <script src="components.js"></script>
  <script src="app.js"></script>
</body>
</html>
